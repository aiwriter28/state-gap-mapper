<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">State Gap Mapper social preview</title>
  <desc id="desc">State Gap Mapper finds the missing behavior in a feature spec, illustrated by a Processing state with a red dashed cancel arrow to an unknown target.</desc>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#6C89A6" opacity="0.18"/>
    </pattern>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E8474F"/>
    </marker>
    <style>
      .ui { font-family: Barlow, Inter, Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0C1B2C"/>
  <rect width="1280" height="640" fill="url(#dots)"/>
  <rect x="1" y="1" width="1278" height="638" fill="none" stroke="#16304F" stroke-width="2"/>

  <text x="64" y="80" class="ui" font-size="23" font-weight="700" letter-spacing="5" fill="#DDE9F5">STATE GAP MAPPER</text>
  <text x="64" y="188" class="ui" font-size="61" font-weight="700" fill="#DDE9F5">Find the behavior</text>
  <text x="64" y="257" class="ui" font-size="61" font-weight="700" fill="#DDE9F5">your feature spec forgot.</text>
  <text x="64" y="329" class="ui" font-size="27" fill="#9BB1C8">Plain-English Spec in. Missing behavior redlined.</text>
  <text x="64" y="368" class="ui" font-size="27" fill="#9BB1C8">Testable product decisions out.</text>

  <rect x="64" y="445" width="252" height="58" rx="10" fill="#16304F" stroke="#34577A"/>
  <text x="190" y="483" class="ui" font-size="22" font-weight="700" fill="#DDE9F5" text-anchor="middle">LIVE PRODUCT</text>
  <text x="64" y="557" class="mono" font-size="20" fill="#6C89A6">state-gap-mapper-build.vercel.app</text>

  <rect x="800" y="165" width="260" height="116" rx="16" fill="#102338" stroke="#DDE9F5" stroke-width="3"/>
  <text x="930" y="233" class="mono" font-size="31" fill="#DDE9F5" text-anchor="middle">Processing</text>
  <path d="M 935 282 C 1010 330 1050 380 1100 431" stroke="#E8474F" stroke-width="10" stroke-dasharray="25 18" fill="none" marker-end="url(#arrow-red)"/>
  <rect x="982" y="304" width="120" height="53" rx="9" fill="#0C1B2C" stroke="#E8474F" stroke-width="2.5"/>
  <text x="1042" y="339" class="mono" font-size="22" fill="#E8474F" text-anchor="middle">cancel</text>
  <text x="1128" y="512" class="mono" font-size="76" font-weight="700" fill="#E8474F" text-anchor="middle">???</text>
  <text x="1128" y="552" class="ui" font-size="18" font-weight="700" letter-spacing="2" fill="#E8474F" text-anchor="middle">TARGET MISSING</text>
</svg>
