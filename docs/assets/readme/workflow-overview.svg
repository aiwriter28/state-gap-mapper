<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">How State Gap Mapper turns a feature spec into a testable decision</title>
  <desc id="desc">Three panels show a checkout spec, the missing cancellation behavior while processing, and the human-approved transition to Cancelled with a Given When Then test stub.</desc>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#6C89A6" opacity="0.16"/>
    </pattern>
    <marker id="arrow-chalk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DDE9F5"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E8474F"/>
    </marker>
    <style>
      .ui { font-family: Barlow, Inter, Arial, sans-serif; }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .eyebrow { font-size: 18px; font-weight: 700; letter-spacing: 2.8px; }
      .panel-title { font-size: 31px; font-weight: 700; fill: #DDE9F5; }
      .body { font-size: 23px; fill: #DDE9F5; }
      .small { font-size: 18px; fill: #9BB1C8; }
      .machine { font-size: 24px; fill: #DDE9F5; }
    </style>
  </defs>

  <rect width="1600" height="760" rx="24" fill="#0C1B2C"/>
  <rect x="1" y="1" width="1598" height="758" rx="23" fill="none" stroke="#16304F" stroke-width="2"/>
  <rect width="1600" height="760" rx="24" fill="url(#dots)"/>

  <text x="50" y="58" class="ui eyebrow" fill="#DDE9F5">STATE GAP MAPPER</text>
  <text x="50" y="106" class="ui" font-size="31" font-weight="700" fill="#DDE9F5">From feature prose to one clear, testable product decision</text>

  <rect x="50" y="145" width="440" height="560" rx="18" fill="#102338" stroke="#34577A" stroke-width="2"/>
  <text x="82" y="192" class="ui eyebrow" fill="#6C89A6">01 / SPEC</text>
  <text x="82" y="238" class="ui panel-title">What the feature says</text>

  <text x="82" y="299" class="mono" font-size="19" fill="#6C89A6">2</text>
  <text x="120" y="299" class="ui body">Checkout moves the order</text>
  <text x="120" y="331" class="ui body">from Cart to Processing.</text>

  <rect x="72" y="368" width="396" height="114" rx="12" fill="#16304F" stroke="#34577A"/>
  <text x="82" y="406" class="mono" font-size="19" fill="#6C89A6">5</text>
  <text x="120" y="406" class="ui body">Cancel moves an order from</text>
  <text x="120" y="438" class="ui body">Cart to Cancelled.</text>

  <text x="82" y="536" class="ui small">The happy path sounds complete.</text>
  <text x="82" y="572" class="ui small">One combination is still undefined:</text>
  <text x="82" y="618" class="mono" font-size="25" fill="#DDE9F5">processing x cancel</text>

  <path d="M 506 425 C 528 425 540 425 558 425" stroke="#DDE9F5" stroke-width="3" fill="none" marker-end="url(#arrow-chalk)"/>

  <rect x="575" y="145" width="450" height="560" rx="18" fill="#102338" stroke="#34577A" stroke-width="2"/>
  <text x="607" y="192" class="ui eyebrow" fill="#E8474F">02 / STRUCTURAL GAP</text>
  <text x="607" y="238" class="ui panel-title">What happens here?</text>

  <rect x="627" y="315" width="190" height="92" rx="14" fill="#102338" stroke="#DDE9F5" stroke-width="2.5"/>
  <text x="722" y="371" class="mono machine" text-anchor="middle">Processing</text>
  <path d="M 817 361 C 865 365 885 402 923 440" stroke="#E8474F" stroke-width="7" stroke-dasharray="18 14" fill="none" marker-end="url(#arrow-red)"/>
  <rect x="823" y="322" width="104" height="44" rx="8" fill="#102338" stroke="#E8474F" stroke-width="2"/>
  <text x="875" y="351" class="mono" font-size="19" fill="#E8474F" text-anchor="middle">cancel</text>
  <text x="930" y="493" class="mono" font-size="54" font-weight="700" fill="#E8474F" text-anchor="middle">???</text>
  <text x="930" y="522" class="ui" font-size="15" font-weight="700" letter-spacing="1.8" fill="#E8474F" text-anchor="middle">TARGET MISSING</text>

  <text x="607" y="586" class="ui body">Evidence points back to</text>
  <text x="607" y="620" class="ui body">the exact Spec sentences.</text>
  <rect x="607" y="643" width="54" height="38" rx="7" fill="#16304F" stroke="#6C89A6"/>
  <rect x="673" y="643" width="54" height="38" rx="7" fill="#16304F" stroke="#6C89A6"/>
  <text x="634" y="669" class="mono" font-size="18" fill="#DDE9F5" text-anchor="middle">S2</text>
  <text x="700" y="669" class="mono" font-size="18" fill="#DDE9F5" text-anchor="middle">S5</text>

  <path d="M 1042 425 C 1064 425 1076 425 1094 425" stroke="#DDE9F5" stroke-width="3" fill="none" marker-end="url(#arrow-chalk)"/>

  <rect x="1110" y="145" width="440" height="560" rx="18" fill="#102338" stroke="#34577A" stroke-width="2"/>
  <text x="1142" y="192" class="ui eyebrow" fill="#6C89A6">03 / YOUR DECISION</text>
  <text x="1142" y="238" class="ui panel-title">Make the behavior explicit</text>

  <rect x="1147" y="286" width="154" height="76" rx="13" fill="#102338" stroke="#DDE9F5" stroke-width="2.5"/>
  <text x="1224" y="333" class="mono" font-size="21" fill="#DDE9F5" text-anchor="middle">Processing</text>
  <path d="M 1301 324 L 1420 324" stroke="#DDE9F5" stroke-width="3" fill="none" marker-end="url(#arrow-chalk)"/>
  <rect x="1323" y="294" width="78" height="42" rx="7" fill="#102338" stroke="#6C89A6"/>
  <text x="1362" y="322" class="mono" font-size="17" fill="#DDE9F5" text-anchor="middle">cancel</text>
  <rect x="1422" y="286" width="98" height="76" rx="13" fill="#102338" stroke="#DDE9F5" stroke-width="2.5"/>
  <rect x="1428" y="292" width="86" height="64" rx="9" fill="none" stroke="#DDE9F5" stroke-width="1.5"/>
  <text x="1471" y="333" class="mono" font-size="17" fill="#DDE9F5" text-anchor="middle">Cancelled</text>

  <rect x="1142" y="403" width="376" height="230" rx="14" fill="#0C1B2C" stroke="#34577A"/>
  <text x="1172" y="446" class="ui eyebrow" fill="#6C89A6">TEST STUB</text>
  <text x="1172" y="494" class="mono" font-size="19" fill="#9BB1C8">Given</text>
  <text x="1248" y="494" class="mono" font-size="19" fill="#DDE9F5">the order is Processing</text>
  <text x="1172" y="540" class="mono" font-size="19" fill="#9BB1C8">When</text>
  <text x="1248" y="540" class="mono" font-size="19" fill="#DDE9F5">cancel occurs</text>
  <text x="1172" y="586" class="mono" font-size="19" fill="#9BB1C8">Then</text>
  <text x="1248" y="586" class="mono" font-size="19" fill="#DDE9F5">the order is Cancelled</text>
  <text x="1142" y="672" class="ui small">The product never rewrites this decision for you.</text>
</svg>
